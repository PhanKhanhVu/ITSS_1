<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JP Food - Login</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body {
      background: linear-gradient(135deg, #f5f5f7 0%, #fff0f0 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      padding: 0;
    }

    .login-container {
      width: 100%;
      max-width: 440px;
      margin: 40px auto;
      padding: 0 20px;
    }

    .login-card {
      background: var(--bg-surface);
      border-radius: var(--border-radius-lg);
      padding: 48px 40px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08);
      text-align: center;
    }

    .logo-area {
      margin-bottom: 32px;
    }

    .logo-area i {
      font-size: 48px;
      color: var(--primary);
      margin-bottom: 16px;
    }

    .form-group {
      text-align: left;
      margin-bottom: 24px;
    }

    .form-group label {
      display: block;
      font-weight: 600;
      margin-bottom: 8px;
      color: var(--text-main);
      font-size: 14px;
    }

    .form-control {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid var(--border-color);
      border-radius: var(--border-radius-sm);
      font-size: 15px;
      font-family: inherit;
      outline: none;
      transition: var(--transition);
      background: var(--bg-main);
    }

    .form-control:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(218, 41, 28, 0.1);
      background: var(--bg-surface);
    }

    .social-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      width: 100%;
      padding: 14px;
      border-radius: var(--border-radius-full);
      font-weight: 600;
      font-size: 15px;
      cursor: pointer;
      transition: var(--transition);
      margin-bottom: 16px;
      text-decoration: none;
    }

    .btn-google {
      background: white;
      color: var(--text-main);
      border: 1px solid var(--border-color);
    }
    .btn-google:hover { background: #f9f9f9; box-shadow: var(--shadow-sm); }
    
    .btn-apple {
      background: black;
      color: white;
      border: 1px solid black;
    }
    .btn-apple:hover { background: #333; }

    .divider {
      display: flex;
      align-items: center;
      text-align: center;
      color: var(--text-secondary);
      font-size: 13px;
      margin: 32px 0;
    }

    .divider::before, .divider::after {
      content: '';
      flex: 1;
      border-bottom: 1px solid var(--border-color);
    }

    .divider::before { margin-right: 16px; }
    .divider::after { margin-left: 16px; }

  </style>
</head>
<body>

  <div class="login-container animate-fade-in">
    <div class="login-card">
      
      <div class="logo-area">
        <i class="fa-solid fa-bowl-rice"></i>
        <h1 class="text-h1 font-jp" style="color:var(--text-main);">JP Food</h1>
        <p class="text-secondary font-jp mt-1" style="font-size:15px;">ハノイの最高のベトナム料理へ</p>
      </div>

      <div class="form-group font-jp">
        <label>メールアドレス (Email)</label>
        <input type="email" class="form-control" placeholder="example@email.com">
      </div>

      <div class="form-group font-jp mb-4">
        <div class="d-flex justify-content-between">
          <label>パスワード (Password)</label>
          <a href="#" class="text-primary text-small" style="text-decoration:none;">お忘れですか？</a>
        </div>
        <input type="password" class="form-control" placeholder="••••••••">
      </div>

      <a href="1_home.html" class="btn btn-primary btn-block font-jp" style="padding:14px; font-size:16px; margin-bottom:16px;">
        ログイン (Login)
      </a>

      <div class="divider font-jp">または他の方法でログイン</div>

      <button class="social-btn btn-google font-jp">
        <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" alt="Google" style="width:20px; height:20px;">
        Google でログイン
      </button>

      <button class="social-btn btn-apple font-jp">
        <i class="fa-brands fa-apple" style="font-size:20px;"></i>
        Apple でログイン
      </button>

      <p class="text-small font-jp mt-4" style="text-align:center;">
        アカウントをお持ちでない場合は <a href="#" class="text-primary" style="text-decoration:none; font-weight:600;">新規登録</a>
      </p>

    </div>
  </div>

</body>
</html>
