<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JP Food - Favorites List</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    .dashboard-layout {
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 40px;
      padding: 40px 0;
    }
    
    /* Profile Sidebar */
    .profile-sidebar { background: var(--bg-surface); border-radius: var(--border-radius-lg); overflow: hidden; box-shadow: var(--shadow-sm); height: fit-content; }
    .nav-menu { padding: 16px 0; }
    .nav-menu a { display: flex; align-items: center; padding: 16px 24px; color: var(--text-main); text-decoration: none; font-weight: 500; font-size: 15px; border-left: 3px solid transparent; }
    .nav-menu a i { width: 24px; font-size: 18px; color: var(--text-secondary); margin-right: 12px; }
    .nav-menu a:hover { background: var(--bg-main); }
    .nav-menu a.active { color: var(--primary); border-left-color: var(--primary); background: rgba(218,41,28,0.03); }
    .nav-menu a.active i { color: var(--primary); }

    .main-block {
      padding-bottom: 40px;
    }

    /* Tabs */
    .tabs {
      display: flex;
      border-bottom: 2px solid var(--border-color);
      margin-bottom: 24px;
    }
    
    .tab {
      padding: 12px 24px;
      font-size: 16px;
      font-weight: 600;
      color: var(--text-secondary);
      cursor: pointer;
      position: relative;
      transition: var(--transition);
    }
    
    .tab:hover { color: var(--primary); }
    
    .tab.active {
      color: var(--primary);
    }
    
    .tab.active::after {
      content: '';
      position: absolute;
      bottom: -2px;
      left: 0;
      width: 100%;
      height: 2px;
      background: var(--primary);
      border-radius: 2px 2px 0 0;
    }

    /* Grid for Favorites */
    .fav-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px;
    }

    .fav-card {
      background: var(--bg-surface);
      border-radius: var(--border-radius-md);
      box-shadow: var(--shadow-sm);
      overflow: hidden;
      border: 1px solid var(--border-color);
      transition: var(--transition);
      display: flex;
      flex-direction: column;
      position: relative;
    }
    
    .fav-card:hover {
      box-shadow: var(--shadow-md);
      transform: translateY(-4px);
    }
    
    .fav-card .card-img {
      width: 100%;
      height: 160px;
      object-fit: cover;
    }
    
    .fav-btn {
      position: absolute;
      top: 12px;
      right: 12px;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: white;
      color: var(--primary);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: var(--shadow-sm);
      cursor: pointer;
      border: none;
      font-size: 14px;
    }
    
    .fav-card .card-body {
      padding: 16px;
      flex: 1;
      display: flex;
      flex-direction: column;
    }
    
    .rating {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: var(--accent-gold);
      color: white;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 600;
    }
  </style>
</head>
